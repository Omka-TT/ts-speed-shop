name: my_app
description: "My Flutter Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.0.0
  get_it: ^7.0.0
  equatable: ^2.0.0
  
  
  # State Management
  riverpod: ^2.3.7
  
  # HTTP Client
  dio: ^5.3.2
  
  # Navigation
  go_router: ^13.0.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Form Validation
  flutter_form_builder: ^8.5.3
  
  # UI Helpers
  flutter_screenutil: ^5.9.0
  flutter_dotenv: ^5.1.0
  
  # Dev Tools
  flutter_riverpod: ^2.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - .env
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700